<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Software Supply Chain Risk Scorer | SBOM Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

body{
    margin:0;
    background:#f3f6fb;
    font-family:'Inter', sans-serif;
    color:#1f2937;
    overflow-x:hidden;
}

        /* Sidebar */

        .sidebar{

            position:fixed;
            top:0;
            left:0;

            width:250px;
            height:100vh;

            background:#111827;

            color:white;

            padding-top:25px;

            overflow-y:auto;

        }

        .sidebar h3{

            text-align:center;

            font-weight:bold;

            margin-bottom:35px;

            line-height:1.5;

        }

        .sidebar a{

            display:block;

            color:#d1d5db;

            text-decoration:none;

            padding:14px 22px;

            margin:6px 12px;

            border-radius:10px;

            transition:.25s;

            font-size:16px;

        }

        .sidebar a:hover{

            background:#2563eb;

            color:white;

        }

        .sidebar a.active{

            background:#2563eb;

            color:white;

            font-weight:bold;

        }

        /* Main Content */

        .content{

            margin-left:250px;

            padding:30px;

            min-height:100vh;

        }

        /* Cards */

        .card{

            border:none;

            border-radius:15px;

            box-shadow:0 4px 12px rgba(0,0,0,.08);

        }

        /* Tables */

        table{

            background:white;

        }

        .table thead{

            background:#111827;

            color:white;

        }

        /* Footer */

        .footer{

            text-align:center;

            color:gray;

            margin-top:30px;

            font-size:14px;

        }

    </style>

</head>

<body>

<div class="sidebar">

    <h3>

        🚀 SBOM<br>

        Risk Scorer

    </h3>

    <a href="/" class="{% if request.path == '/' %}active{% endif %}">
        🏠 Dashboard
    </a>

    <a href="/applications" class="{% if request.path == '/applications' %}active{% endif %}">
        🏢 Applications
    </a>

    <a href="/dependencies" class="{% if request.path == '/dependencies' %}active{% endif %}">
        📦 Dependencies
    </a>

    <a href="/vulnerabilities" class="{% if request.path == '/vulnerabilities' %}active{% endif %}">
        🛡 Vulnerabilities
    </a>

    <a href="/compliance" class="{% if request.path == '/compliance' %}active{% endif %}">
        ⚖ Compliance
    </a>

    <a href="/reports" class="{% if request.path == '/reports' %}active{% endif %}">
        📄 Reports
    </a>

</div>

<div class="content">

    {% block content %}
    {% endblock %}

    <div class="footer">

        Software Supply Chain Risk Analyzer • Societe Generale Hackathon 2026

    </div>

</div>

</body>

</html>
