<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Software Supply Chain Risk Scorer | SBOM Analyzer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- dashboard-title / stat-card animation classes live here -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
    body{
        margin:0;
        background: radial-gradient(circle at 10% 0%, #131c31 0%, #0b1120 45%, #070b16 100%);
        font-family:'Inter', sans-serif;
        color:#e2e8f0;
        overflow-x:hidden;
    }

        /* Sidebar */
        .sidebar{
            position:fixed;
            top:0;
            left:0;
            width:250px;
            height:100vh;
            background:#0d1425;
            border-right:1px solid rgba(148,163,184,0.12);
            color:white;
            padding-top:25px;
            overflow-y:auto;
            transform:translateX(-100%);
            animation:slideInSidebar .5s ease forwards;
            z-index: 100;
        }
        @keyframes slideInSidebar{
            from{ transform:translateX(-100%); }
            to{ transform:translateX(0); }
        }
        .sidebar h3{
            text-align:center;
            font-weight:800;
            margin-bottom:35px;
            line-height:1.5;
            background: linear-gradient(90deg,#22d3ee,#8b5cf6,#ec4899,#22d3ee);
            background-size:300% auto;
            -webkit-background-clip:text;
            background-clip:text;
            color:transparent;
            animation: shimmer 6s linear infinite;
        }
        @keyframes shimmer{
            0%{ background-position:0% center; }
            100%{ background-position:300% center; }
        }
        .sidebar a{
            display:block;
            color:#94a3b8;
            text-decoration:none;
            padding:14px 22px;
            margin:6px 12px;
            border-radius:10px;
            transition:.25s;
            font-size:16px;
            opacity:0;
            animation:linkFadeIn .4s ease forwards;
        }
        /* stagger each nav link so they appear one after another */
        .sidebar a:nth-of-type(1){ animation-delay:.15s; }
        .sidebar a:nth-of-type(2){ animation-delay:.20s; }
        .sidebar a:nth-of-type(3){ animation-delay:.25s; }
        .sidebar a:nth-of-type(4){ animation-delay:.30s; }
        .sidebar a:nth-of-type(5){ animation-delay:.35s; }
        .sidebar a:nth-of-type(6){ animation-delay:.40s; }
        .sidebar a:nth-of-type(7){ animation-delay:.45s; }
        @keyframes linkFadeIn{
            from{ opacity:0; transform:translateX(-10px); }
            to{ opacity:1; transform:translateX(0); }
        }
        .sidebar a:hover{
            background: linear-gradient(90deg, rgba(99,102,241,0.25), rgba(139,92,246,0.25));
            color:white;
            padding-left:28px;
        }
        .sidebar a.active{
            background: linear-gradient(90deg,#6366f1,#8b5cf6);
            color:white;
            font-weight:600;
            box-shadow: 0 4px 14px rgba(139,92,246,0.35);
        }

        /* Main Content */
        .content{
            margin-left:250px;
            padding:30px;
            min-height:100vh;
            animation:contentFadeIn .6s ease .2s both;
        }
        @keyframes contentFadeIn{
            from{ opacity:0; transform:translateY(15px); }
            to{ opacity:1; transform:translateY(0); }
        }

        /* Cards */
        .card{
            border:none;
            border-radius:15px;
        }

        /* Tables */
        .table thead{
            background:#0d1425;
            color:white;
        }

        /* Footer */
        .footer{
            text-align:center;
            color:#64748b;
            margin-top:30px;
            font-size:14px;
        }

        /* Mobile responsive toggle (sidebar collapses under 768px) */
        .menu-toggle{
            display:none;
            position:fixed;
            top:16px;
            left:16px;
            z-index:200;
            background: linear-gradient(90deg,#6366f1,#8b5cf6);
            color:white;
            border:none;
            padding:8px 14px;
            border-radius:8px;
            cursor:pointer;
        }
        @media (max-width:768px){
            .menu-toggle{ display:block; }
            .sidebar{
                transform:translateX(-100%);
                animation:none;
                transition:transform .35s ease;
            }
            .sidebar.open{ transform:translateX(0); }
            .content{ margin-left:0; }
        }
        /* Top page-loading bar */
        #page-loader{
            position:fixed;
            top:0;
            left:0;
            height:3px;
            width:0%;
            background: linear-gradient(90deg,#22d3ee,#8b5cf6,#ec4899);
            z-index:9999;
            transition: width .3s ease;
        }
        #page-loader.loading{
            width:70%;
        }
    </style>

</head>

<body>

<div id="page-loader"></div>

<button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>

<div class="sidebar">
    <h3>
        🛡️ SBOM<br>
        Risk Scorer
    </h3>
    <a href="/" class="{% if request.path == '/' %}active{% endif %}">
        🏠 Dashboard
    </a>
    <a href="/applications" class="{% if request.path == '/applications' %}active{% endif %}">
        🏢 Applications
    </a>
    <a href="/dependencies" class="{% if request.path == '/dependencies' %}active{% endif %}">
        📦 Dependencies
    </a>
    <a href="/graph" class="{% if request.path == '/graph' %}active{% endif %}">
        🕸️ Dependency Graph
    </a>
    <a href="/vulnerabilities" class="{% if request.path == '/vulnerabilities' %}active{% endif %}">
        🛡 Vulnerabilities
    </a>
    <a href="/compliance" class="{% if request.path == '/compliance' %}active{% endif %}">
        ⚖ Compliance
    </a>
    <a href="/reports" class="{% if request.path == '/reports' %}active{% endif %}">
        📄 Reports
    </a>
</div>

<div class="content">
    {% block content %}
    {% endblock %}

    <div class="footer">
        Software Supply Chain Risk Analyzer • Societe Generale Hackathon 2026
    </div>
</div>

<script>
document.querySelectorAll('.sidebar a').forEach(link => {
    link.addEventListener('click', function(e){
        if (this.href && !this.href.includes('#')) {
            document.getElementById('page-loader').classList.add('loading');
        }
    });
});
</script>

</body>
</html>
